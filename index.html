// Affiche une vraie erreur au lieu d'une page blanche si un CDN ne charge pas.
(function(){
  function show(msg){
    var root = document.getElementById('root');
    if (!root) { window.__cdcBootError = msg; return; }
    root.innerHTML = '<div style="max-width:720px;margin:40px auto;padding:20px;border:1px solid #e2c7a2;border-radius:16px;background:#fffaf3;color:#211b14;font-family:Arial,sans-serif;line-height:1.45"><h1 style="margin:0 0 10px;font-size:22px">Erreur de chargement</h1><p style="margin:0 0 10px">' + msg + '</p><p style="margin:0;font-size:13px;color:#6f6252">Ouvre F12 → Console pour voir le détail exact.</p></div>';
  }
  window.addEventListener('error', function(e){
    var t = e.target;
    if (t && t.tagName === 'SCRIPT' && t.src) show('Un fichier JavaScript externe ne charge pas : ' + t.src);
  }, true);
  window.__cdcShowBootError = show;
})();
</script>

function mergeDefaultDishesCatalog(savedDishes) {

  const additions = DEFAULT_DISHES.filter(d => !existing.has(d.name.trim().toLowerCase()));
  return additions.length ? [...savedDishes, ...clone(additions)] : savedDishes;
}

/* ----------------------------- Stockage (localStorage + fallback mémoire) ----------------------------- */
const memFallback = {};
const storage = {
  get(key) {
    try { const v = localStorage.getItem('cdc_' + key); return v === null ? null : { value: v }; }
    catch (e) { return (key in memFallback) ? { value: memFallback[key] } : null; }
  },
  set(key, value) {
    try { localStorage.setItem('cdc_' + key, value); }
    catch (e) { memFallback[key] = value; }
  },
};
function persist(key, value) { storage.set(key, JSON.stringify(value)); }

/* ----------------------------- Helpers ----------------------------- */
function uid() { return 'd' + Math.random().toString(36).slice(2, 9); }
function roundTo(value, step) { return Math.round(value / step) * step; }
function trimNum(n) { return Number.isInteger(n) ? `${n}` : `${n.toFixed(1)}`; }
function hashCode(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; } return h; }

function formatQty(unit, qty) {
  if (qty <= 0) return '0';
  if (unit === 'g') return qty >= 1000 ? `${trimNum(qty / 1000)} kg` : `${Math.round(qty)} g`;
  if (unit === 'ml') return qty >= 1000 ? `${trimNum(qty / 1000)} L` : `${Math.round(qty)} ml`;
  if (unit === 'cas' || unit === 'cac') return `${trimNum(roundTo(qty, 0.5))} ${UNIT_LABELS[unit]}`;
  if (DISCRETE_UNITS.includes(unit)) return `${Math.ceil(qty)} ${UNIT_LABELS[unit]}`;
  return `${trimNum(roundTo(qty, 0.5))} ${unit}`;
}

function sanitizeIngredient(ing) {
  let { name, qty, unit, category } = ing;
  name = (name || '').toString().trim() || 'Ingrédient';
  qty = Number(qty);
  if (!isFinite(qty) || qty <= 0) qty = 1;
  if (unit === 'kg') { unit = 'g'; qty *= 1000; }
  if (unit === 'l') { unit = 'ml'; qty *= 1000; }
  if (!UNIT_OPTIONS.includes(unit)) unit = 'g';
  if (!CATEGORIES.some(c => c.id === category)) category = 'epicerie';
  return { name, qty: roundTo(qty, 0.5), unit, category };
}

function aggregateIngredients(entries, servings) {
  const totals = new Map();
  entries.forEach(entry => {
    (entry.ingredients || []).forEach(ing => {
      const key = `${ing.name.trim().toLowerCase()}|${ing.unit}`;
      const qty = (ing.qty || 0) * servings;
      if (totals.has(key)) totals.get(key).qty += qty;
      else totals.set(key, { name: ing.name.trim(), unit: ing.unit, category: ing.category, qty });
    });
  });
  return Array.from(totals.values());
}

function tornEdgeClipPath(teeth = 14, depthPx = 6) {
  const points = ['0% 0%', '100% 0%', `100% calc(100% - ${depthPx}px)`];
  for (let i = teeth; i >= 0; i--) {
    const x = (i / teeth) * 100;
    const y = i % 2 === 0 ? `calc(100% - ${depthPx}px)` : '100%';
    points.push(`${x.toFixed(2)}% ${y}`);
  }
  return `polygon(${points.join(', ')})`;
}

function parseDishesImport(text) {
  const data = JSON.parse(text);
  const arr = Array.isArray(data) ? data : (Array.isArray(data.dishes) ? data.dishes : null);
  if (!arr) throw new Error('format');
  const parsed = arr.map(d => ({
    name: String((d && d.name) || '').trim(),
    tags: Array.isArray(d && d.tags) ? d.tags.filter(t => typeof t === 'string').slice(0, 4) : [],
    ingredients: Array.isArray(d && d.ingredients) ? d.ingredients.map(sanitizeIngredient) : [],
  })).filter(d => d.name && d.ingredients.length);
  if (parsed.length === 0) throw new Error('vide');
  return parsed;
}

// Construit la structure { p: personnes, j: jours, stores: [{id, items:[{n,q,c}]}] } pour les magasins physiques
function buildPhysicalShare(shoppingList, storeOf, planning) {
  const stores = PHYSICAL_STORES.map(sid => {
    const items = shoppingList
      .filter(it => storeOf(it.name) === sid)
      .map(it => ({ n: it.name, q: formatQty(it.unit, it.qty), c: it.category }))
      .sort((a, b) => a.n.localeCompare(b.n));
    return { id: sid, items };
  }).filter(s => s.items.length);
  return { v: 1, p: planning.servings, j: planning.days, stores };
}

// Texte lisible (pour copier / partager / QR sans hébergement)
function shareToText(data) {
  let out = `Liste de courses — ${data.p} pers.\n`;
  data.stores.forEach(s => {
    out += `\n=== ${storeById(s.id).label.toUpperCase()} ===\n`;
    s.items.forEach(it => { out += `[ ] ${it.n} — ${it.q}\n`; });
  });
  return out.trim();
}

function encodeShare(data) {
  const json = JSON.stringify(data);
  try {
    if (window.LZString) return 'z' + window.LZString.compressToEncodedURIComponent(json);
  } catch (e) {}
  return 'j' + encodeURIComponent(json);
}
function decodeShare(str) {
  if (!str) return null;
  try {
    const flag = str[0], payload = str.slice(1);
    let json;
    if (flag === 'z' && window.LZString) json = window.LZString.decompressFromEncodedURIComponent(payload);
    else if (flag === 'j') json = decodeURIComponent(payload);
    else return null;
    return JSON.parse(json);
  } catch (e) { return null; }
}

/* ---------- Firestore : liste partagée temps réel ---------- */
function hasLiveSync() {
  return !!(window.cdcFirestore && window.firebase && window.firebase.firestore);
}

function makeLiveListId() {
  const cryptoPart = window.crypto && window.crypto.getRandomValues
    ? Array.from(window.crypto.getRandomValues(new Uint8Array(12))).map(b => b.toString(36).padStart(2, '0')).join('').slice(0, 18)
    : Math.random().toString(36).slice(2, 14);
  return (Date.now().toString(36) + cryptoPart).replace(/[^A-Za-z0-9_-]/g, '').slice(0, 32);
}

function makeLiveItemId(storeId, item, order) {
  const raw = `${storeId}|${item.n}|${item.q}|${item.c}|${order}`;
  return `i_${Math.abs(hashCode(raw)).toString(36)}_${order}`.slice(0, 80);
}

async function createLiveShoppingList(data) {
  if (!hasLiveSync()) throw new Error('Firebase / Firestore non chargé.');
  const db = window.cdcFirestore;
  const FieldValue = window.firebase.firestore.FieldValue;
  const listId = makeLiveListId();
  const listRef = db.collection('shoppingLists').doc(listId);
  const batch = db.batch();

  batch.set(listRef, {
    title: 'Liste de courses',
    createdAt: FieldValue.serverTimestamp(),
    updatedAt: FieldValue.serverTimestamp(),
    ownerName: '',
    source: 'github-pages'
  });

  let order = 0;
  data.stores.forEach(store => {
    store.items.forEach(item => {
      const itemId = makeLiveItemId(store.id, item, order);
      batch.set(listRef.collection('items').doc(itemId), {
        name: String(item.n || '').slice(0, 120),
        quantity: String(item.q || '').slice(0, 60),
        unit: '',
        store: store.id,
        category: item.c || 'epicerie',
        checked: false,
        takenBy: null,
        checkedAt: null,
        updatedAt: FieldValue.serverTimestamp(),
        order
      });
      order += 1;
    });
  });

  await batch.commit();
  return listId;
}

function PlanningView({ dishes, planning, updatePlanning }) {
  const setServings = (n) => updatePlanning({ ...planning, servings: Math.max(1, Math.min(20, n)) });

  const setDays = (n) => {
    n = Math.max(1, Math.min(7, n));
    const entries = [...planning.entries];
    while (entries.length < n) entries.push({ dishId: '', name: '', ingredients: [] });
    entries.length = n;
    updatePlanning({ ...planning, days: n, entries });
  };

  const onName = (i, value) => {
    const match = dishes.find(d => d.name.toLowerCase() === value.trim().toLowerCase());
    const entries = [...planning.entries];
    const cur = entries[i] || { dishId: '', name: '', ingredients: [] };
    if (match) {
      if (cur.dishId === match.id) entries[i] = { ...cur, name: match.name };
      else entries[i] = { dishId: match.id, name: match.name, ingredients: clone(match.ingredients) };
    } else {
      entries[i] = { ...cur, dishId: '', name: value };
    }
    updatePlanning({ ...planning, entries });
  };

  const onReload = (i) => {
    const cur = planning.entries[i];
    const dish = dishes.find(d => d.id === cur.dishId);
    if (!dish) return;
    const entries = [...planning.entries];
    entries[i] = { dishId: dish.id, name: dish.name, ingredients: clone(dish.ingredients) };
    updatePlanning({ ...planning, entries });
  };

  const mutIngs = (i, fn) => {
    const entries = [...planning.entries];
    const ings = [...(entries[i].ingredients || [])];
    fn(ings);
    entries[i] = { ...entries[i], ingredients: ings };
    updatePlanning({ ...planning, entries });
  };
  const onIng = (i, j, field, value) => mutIngs(i, ings => { ings[j] = { ...ings[j], [field]: value }; });
  const onAddIng = (i) => mutIngs(i, ings => { ings.push({ name: '', qty: 1, unit: 'g', category: 'legumes' }); });
  const onRemoveIng = (i, j) => mutIngs(i, ings => { ings.splice(j, 1); });

  const fillRandomPlanning = () => {
    const count = Math.max(1, Math.min(7, planning.days || 1));
    const pool = (dishes || []).filter(d => d && d.name);
    if (!pool.length) return;

    const shuffled = [...pool];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    const entries = Array.from({ length: count }, (_, i) => {
      const dish = shuffled[i % shuffled.length];
      return { dishId: dish.id, name: dish.name, ingredients: clone(dish.ingredients || []) };
    });

    updatePlanning({ ...planning, days: count, entries });
  };

  return (
    <div className="space-y-4">
      <div className="flex items-end justify-between gap-4 flex-wrap">
        <div className="flex gap-8">
          <Stepper label="Personnes" value={planning.servings} onChange={setServings} min={1} max={20} />
          <Stepper label="Jours" value={planning.days} onChange={setDays} min={1} max={7} />
        </div>
        <button className="btn-primary" onClick={fillRandomPlanning} disabled={!dishes.length} title="Remplir le planning avec des plats aléatoires">
          <Ic n="refresh" s={14} /> Planning aléatoire
        </button>
      </div>
      <p className="text-xs text-ink-soft">
        Tape le nom d'un plat (l'autocomplétion propose tes plats enregistrés). Les quantités affichées par jour sont modifiables pour cette commande, sans changer la recette d'origine. À droite : le total pour {planning.servings} pers.
      </p>
      <datalist id="cdc-dishes">
        {dishes.map(d => <option key={d.id} value={d.name} />)}
      </datalist>
      <div className="space-y-2">
        {planning.entries.map((entry, i) => (
          <PlanningDay
            key={i}
            index={i}
            entry={entry}
            servings={planning.servings}
            onName={onName}
            onReload={onReload}
            onIng={onIng}
            onAddIng={onAddIng}
            onRemoveIng={onRemoveIng}
          />
        ))}
      </div>
    </div>
  );
}

function ProductsView({ dishes, planning, mappings, updateMapping }) {
  const masterIngredients = useMemo(() => {
    const map = new Map();

      const key = ing.name.trim().toLowerCase();
      if (key && !map.has(key)) map.set(key, { name: ing.name.trim(), category: ing.category });

    dishes.forEach(d => d.ingredients.forEach(add));
    (planning.entries || []).forEach(e => (e.ingredients || []).forEach(add));

  return (
    <div>

/* ----------------------------- Modale : Envoyer sur mobile ----------------------------- */
function SendMobileModal({ shareData, onClose }) {
  const qrRef = useRef(null);
  const [copied, setCopied] = useState(false);
  const [qrError, setQrError] = useState(false);
  const [liveLink, setLiveLink] = useState('');
  const [liveListId, setLiveListId] = useState('');
  const [creatingLive, setCreatingLive] = useState(false);
  const [liveError, setLiveError] = useState('');

  const isHosted = window.location.protocol === 'http:' || window.location.protocol === 'https:';
  const text = useMemo(() => shareToText(shareData), [shareData]);
  const fallbackLink = useMemo(() => {
    const base = window.location.href.split('#')[0];
    return base + '#share=' + encodeShare(shareData);
  }, [shareData]);

  const createLive = async () => {
    if (!isHosted) { setLiveError("Le mode temps réel nécessite le site hébergé en http/https."); return; }
    if (!hasLiveSync()) { setLiveError("Firebase n'est pas chargé : QR classique non synchronisé utilisé."); return; }
    setCreatingLive(true);
    setLiveError('');
    try {
      const id = await createLiveShoppingList(shareData);
      const base = window.location.href.split('#')[0];
      setLiveListId(id);
      setLiveLink(base + '#live=' + id);
    } catch (e) {
      console.error(e);
      setLiveError("Impossible de créer la liste temps réel. Vérifie les règles Firestore puis réessaie.");
    } finally {
      setCreatingLive(false);
    }
  };

  useEffect(() => {
    if (!isHosted || liveLink || creatingLive || liveError) return;
    if (!shareData || !shareData.stores || !shareData.stores.length) return;
    if (!hasLiveSync()) { setLiveError("Firebase n'est pas chargé : QR classique non synchronisé utilisé."); return; }
    createLive();
  }, [isHosted, shareData]);

  // Si Firestore a créé une session, le QR pointe vers #live=... ; sinon on garde le partage local #share=...
  const qrContent = liveLink || (isHosted ? fallbackLink : text);

  useEffect(() => {
    if (!qrRef.current) return;
    qrRef.current.innerHTML = '';
    setQrError(false);
    if (!window.qrcode) { setQrError(true); return; }
    try {
      const qr = window.qrcode(0, 'L');
      qr.addData(qrContent);
      qr.make();
      qrRef.current.innerHTML = qr.createSvgTag({ cellSize: 4, margin: 2, scalable: true });
      const svg = qrRef.current.querySelector('svg');
      if (svg) { svg.setAttribute('width', '220'); svg.setAttribute('height', '220'); svg.removeAttribute('style'); }
    } catch (e) { setQrError(true); }
  }, [qrContent]);

  const doCopy = () => {
    const payload = liveLink || text;
    navigator.clipboard && navigator.clipboard.writeText(payload).then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 1600);
    }).catch(() => {});
  };
  const doShare = () => {
    if (!navigator.share) return;
    if (liveLink) navigator.share({ title: 'Liste de courses partagée', text: 'Liste de courses partagée', url: liveLink }).catch(() => {});
    else navigator.share({ title: 'Liste de courses', text }).catch(() => {});
  };

  const totalItems = shareData.stores.reduce((n, s) => n + s.items.length, 0);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: '30rem' }} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-3">
          <h2 className="font-display text-xl">Envoyer sur mobile</h2>
          <button onClick={onClose}><Ic n="x" s={18} /></button>
        </div>
        <p className="text-xs text-ink-soft mb-3">
          Listes magasin physique ({totalItems} article{totalItems > 1 ? 's' : ''}) : {shareData.stores.map(s => storeById(s.id).label).join(' + ')}.
        </p>

        {creatingLive && (
          <div className="cdc-info mb-3">Création de la liste partagée temps réel…</div>
        )}
        {liveLink && (
          <div className="cdc-info mb-3">
            Mode temps réel activé. Scanne ce QR code avec les deux téléphones : quand une personne coche un article, l'autre le voit aussi.
            {liveListId && <div className="font-mono text-xs mt-1">Session : {liveListId}</div>}
          </div>
        )}
        {liveError && !liveLink && (
          <div className="cdc-info mb-3">
            {liveError}<br />Le QR reste utilisable, mais les coches ne seront pas synchronisées entre téléphones.
            <div className="mt-2"><button className="btn-ghost" onClick={createLive} disabled={creatingLive}>Réessayer le temps réel</button></div>
          </div>
        )}

        {!qrError && (
          <div className="qr-box mb-2"><div ref={qrRef} /></div>
        )}
        <p className="text-xs text-ink-soft text-center mb-3">
          {liveLink
            ? 'Scanne avec chaque téléphone : la liste est cochable et synchronisée.'
            : (isHosted
              ? 'Scanne avec l\'appareil photo du téléphone : la liste s\'ouvre, cochable.'
              : 'Scanne avec l\'appareil photo du téléphone pour afficher la liste.')}
        </p>

        <div className="flex gap-2 mb-3">
          <button className="btn-primary" style={{ flex: 1, justifyContent: 'center' }} onClick={doCopy}>
            <Ic n={copied ? 'check' : 'copy'} s={14} /> {copied ? 'Copié !' : (liveLink ? 'Copier le lien' : 'Copier la liste')}
          </button>
          {navigator.share && (
            <button className="btn-ghost" onClick={doShare}><Ic n="share" s={14} /> Partager</button>
          )}
        </div>

        {!liveLink && isHosted && !creatingLive && !liveError && (
          <button className="btn-ghost w-full mb-3" onClick={createLive}>Créer une liste partagée temps réel</button>
        )}

        {!isHosted && (
          <div className="cdc-info">
            Astuce : si tu veux une liste <strong>cochable</strong> sur le téléphone (et pas juste du texte), héberge ce fichier gratuitement (Netlify, GitHub Pages, Cloudflare Pages). Le QR ouvrira alors directement la liste interactive. Sinon, « Copier la liste » puis envoie-la par WhatsApp ou SMS marche parfaitement.
          </div>
        )}

        <details className="mt-3">
          <summary className="text-xs text-ink-soft" style={{ cursor: 'pointer' }}>Voir / copier le texte</summary>
          <textarea className="export-area font-mono mt-2" readOnly value={text} rows={8} />
        </details>
      </div>
    </div>
  );
}

/* ----------------------------- Vue temps réel (mobile, via Firestore) ----------------------------- */
function LiveListView({ listId }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [buyerName, setBuyerName] = useState(() => {
    const r = storage.get('buyerName');
    try { return r ? JSON.parse(r.value) : ''; } catch (e) { return ''; }
  });
  const [draftName, setDraftName] = useState(buyerName || '');

  useEffect(() => {
    if (!listId || !hasLiveSync()) {
      setError("Firebase n'est pas chargé. Impossible d'ouvrir la liste synchronisée.");
      setLoading(false);
      return;
    }
    setLoading(true);
    const ref = window.cdcFirestore.collection('shoppingLists').doc(listId).collection('items').orderBy('order');
    const unsubscribe = ref.onSnapshot(snapshot => {
      setItems(snapshot.docs.map(doc => ({ id: doc.id, ref: doc.ref, ...doc.data() })));
      setError('');
      setLoading(false);
    }, err => {
      console.error(err);
      setError("Impossible de lire la liste. Vérifie les règles Firestore ou le lien scanné.");
      setLoading(false);
    });
    return () => unsubscribe();
  }, [listId]);

  const saveName = () => {
    const n = (draftName || '').trim().slice(0, 32);
    if (!n) return;
    setBuyerName(n);
    persist('buyerName', n);
  };

  const ensureBuyerName = () => {
    if (buyerName) return buyerName;
    const n = window.prompt('Qui fait les courses ? Exemple : Maman, Philippe, Matthieu') || '';
    const clean = n.trim().slice(0, 32);
    if (!clean) return '';
    setBuyerName(clean);
    setDraftName(clean);
    persist('buyerName', clean);
    return clean;
  };

  const toggleItem = async (item) => {
    if (!item || !item.ref || !hasLiveSync()) return;
    const nextChecked = !item.checked;
    const name = nextChecked ? ensureBuyerName() : '';
    if (nextChecked && !name) return;
    const FieldValue = window.firebase.firestore.FieldValue;
    try {
      await item.ref.update({
        checked: nextChecked,
        takenBy: nextChecked ? name : null,
        checkedAt: nextChecked ? FieldValue.serverTimestamp() : null,
        updatedAt: FieldValue.serverTimestamp()
      });
    } catch (e) {
      console.error(e);
      window.alert("Impossible de mettre à jour l'article. Vérifie la connexion ou les règles Firestore.");
    }
  };

  const exitShared = () => { window.location.hash = ''; window.location.reload(); };

  const stores = PHYSICAL_STORES.map(sid => ({ id: sid, items: items.filter(it => it.store === sid) })).filter(s => s.items.length);
  const doneCount = items.filter(it => it.checked).length;

  return (
    <div className="recv-root">
      <div className="mb-3">
        <div className="text-xs uppercase tracking-widest text-ink-soft">Liste partagée temps réel</div>
        <h1 className="font-display text-2xl">À acheter en magasin</h1>
        <div className="text-xs text-ink-soft">{doneCount}/{items.length} article{items.length > 1 ? 's' : ''} pris · session {listId}</div>
      </div>

      <div className="recv-store">
        <div className="text-xs text-ink-soft mb-2">Nom affiché quand tu coches un article</div>
        <div className="flex gap-2">
          <input className="input-field" style={{ flex: 1 }} value={draftName} onChange={e => setDraftName(e.target.value)} placeholder="Maman, Philippe…" />
          <button className="btn-primary" onClick={saveName} disabled={!draftName.trim()}>OK</button>
        </div>
        {buyerName && <div className="text-xs text-ink-soft mt-2">Actuellement : <strong>{buyerName}</strong></div>}
      </div>

      {loading && <p className="text-ink-soft text-sm">Chargement de la liste partagée…</p>}
      {error && <div className="cdc-info">{error}</div>}
      {!loading && !error && items.length === 0 && <div className="cdc-info">Cette liste ne contient aucun article.</div>}

      {stores.map(store => {
        const so = storeById(store.id);
        const byCat = {};
        store.items.forEach(it => { (byCat[it.category] = byCat[it.category] || []).push(it); });
        const cats = CATEGORIES.filter(c => byCat[c.id]).map(c => c.id);
        return (
          <div key={store.id} className="recv-store">
            <div className="font-display text-lg mb-1" style={{ color: so.color }}>{so.label}</div>
            {cats.map(cid => (
              <div key={cid}>
                <div className="text-xs font-semibold tracking-wide mt-2 mb-1" style={{ color: (CATEGORIES.find(c => c.id === cid) || {}).color }}>
                  {catLabel(cid).toUpperCase()}
                </div>
                {byCat[cid].map(it => {
                  const done = !!it.checked;
                  return (
                    <label key={it.id} className={`recv-line ${done ? 'done' : ''}`}>
                      <input type="checkbox" checked={done} onChange={() => toggleItem(it)} />
                      <span className="rn">
                        {it.name}
                        {done && it.takenBy && <span className="text-xs text-ink-soft"> — pris par {it.takenBy}</span>}
                      </span>
                      <span className="recv-qty">{it.quantity}</span>
                    </label>
                  );
                })}
              </div>
            ))}
          </div>
        );
      })}

      <button className="btn-ghost" onClick={exitShared} style={{ marginTop: '0.5rem' }}>Ouvrir l'application complète</button>
    </div>
  );
}

/* ----------------------------- Vue reçue (mobile, via QR/lien) ----------------------------- */
function ReceivedListView({ data }) {
  const sig = useMemo(() => 'recv_' + hashCode(JSON.stringify(data)), [data]);
  const [checked, setChecked] = useState(() => {
    const r = storage.get(sig);
    try { return r ? JSON.parse(r.value) : {}; } catch (e) { return {}; }
  });
  const toggle = (k) => {
    const next = { ...checked, [k]: !checked[k] };
    if (!next[k]) delete next[k];
    setChecked(next);
    persist(sig, next);
  };
  const exitShared = () => { window.location.hash = ''; window.location.reload(); };

  return (
    <div className="recv-root">
      <div className="mb-3">
        <div className="text-xs uppercase tracking-widest text-ink-soft">Liste de courses</div>
        <h1 className="font-display text-2xl">À acheter en magasin</h1>
        <div className="text-xs text-ink-soft">{data.p} pers.{data.j ? ` · ${data.j} jours` : ''}</div>
      </div>

      {data.stores.map(store => {
        const so = storeById(store.id);
        const byCat = {};
        store.items.forEach(it => { (byCat[it.c] = byCat[it.c] || []).push(it); });
        const cats = CATEGORIES.filter(c => byCat[c.id]).map(c => c.id);
        return (
          <div key={store.id} className="recv-store">
            <div className="font-display text-lg mb-1" style={{ color: so.color }}>{so.label}</div>
            {cats.map(cid => (
              <div key={cid}>
                <div className="text-xs font-semibold tracking-wide mt-2 mb-1" style={{ color: (CATEGORIES.find(c => c.id === cid) || {}).color }}>
                  {catLabel(cid).toUpperCase()}
                </div>
                {byCat[cid].map((it, i) => {
                  const k = store.id + '|' + it.n;
                  const done = !!checked[k];
                  return (
                    <label key={i} className={`recv-line ${done ? 'done' : ''}`}>
                      <input type="checkbox" checked={done} onChange={() => toggle(k)} />
                      <span className="rn">{it.n}</span>
                      <span className="recv-qty">{it.q}</span>
                    </label>
                  );
                })}
              </div>
            ))}
          </div>
        );
      })}

      <button className="btn-ghost" onClick={exitShared} style={{ marginTop: '0.5rem' }}>Ouvrir l'application complète</button>
    </div>
  );
}

/* ----------------------------- App ----------------------------- */
function App() {
  // Détection d'une liste partagée (QR/lien ouvert sur le téléphone)
  const sharedData = useMemo(() => {
    const h = window.location.hash || '';
    const m = h.match(/^#share=([\s\S]*)$/);
    return m ? decodeShare(m[1]) : null;
  }, []);
  const liveListId = useMemo(() => {
    const h = window.location.hash || '';
    const m = h.match(/^#live=([A-Za-z0-9_-]{12,64})$/);
    return m ? m[1] : null;
  }, []);

  const [loading, setLoading] = useState(true);
  const [dishes, setDishes] = useState([]);
  const [mappings, setMappings] = useState({});
  const [storeAssign, setStoreAssign] = useState({});
  const [planning, setPlanning] = useState({ servings: 3, days: 5, entries: [] });
  const [activeTab, setActiveTab] = useState('plats');
  const [checked, setChecked] = useState({});

  const [showForm, setShowForm] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [sendData, setSendData] = useState(null);
  const [draft, setDraft] = useState(null);

  useEffect(() => {
    if (sharedData || liveListId) { setLoading(false); return; }

    let d = null;
    const rd = storage.get('dishes');
    const rv = storage.get('dishesVersion');
    const dishesVersion = rv ? Number(rv.value || 0) : 0;
    try { d = rd ? JSON.parse(rd.value) : null; } catch (e) { d = null; }
    if (!d) {
      d = clone(DEFAULT_DISHES);
      persist('dishes', d);
      storage.set('dishesVersion', String(DEFAULT_DISHES_VERSION));
    } else if (dishesVersion < DEFAULT_DISHES_VERSION) {
      const merged = mergeDefaultDishesCatalog(d);
      if (merged.length !== d.length) { d = merged; persist('dishes', d); }
      storage.set('dishesVersion', String(DEFAULT_DISHES_VERSION));
    }
    setDishes(d);

    let m = {};
    const rm = storage.get('mappings');
    try { m = rm ? JSON.parse(rm.value) : {}; } catch (e) { m = {}; }
    setMappings(m);

    let sa = {};
    const rsa = storage.get('storeAssign');
    try { sa = rsa ? JSON.parse(rsa.value) : {}; } catch (e) { sa = {}; }
    setStoreAssign(sa);

    let p = null;
    const rp = storage.get('planning');
    try { p = rp ? JSON.parse(rp.value) : null; } catch (e) { p = null; }

    if (p && p.dayDishIds && !p.entries) {
      p.entries = p.dayDishIds.map(id => {
        const dish = d.find(x => x.id === id);
        return dish ? { dishId: dish.id, name: dish.name, ingredients: clone(dish.ingredients) } : { dishId: '', name: '', ingredients: [] };
      });
      delete p.dayDishIds;
    }
    if (!p) {
      p = { servings: 3, days: 5, entries: d.slice(0, 5).map(dish => ({ dishId: dish.id, name: dish.name, ingredients: clone(dish.ingredients) })) };
    }
    if (!Array.isArray(p.entries)) p.entries = [];
    while (p.entries.length < p.days) p.entries.push({ dishId: '', name: '', ingredients: [] });
    p.entries.length = p.days;
    setPlanning(p);

    setLoading(false);
  }, [sharedData, liveListId]);

  const updateDishes = (next) => { setDishes(next); persist('dishes', next); };
  const updateMappings = (next) => { setMappings(next); persist('mappings', next); };
  const updateStoreAssign = (next) => { setStoreAssign(next); persist('storeAssign', next); };
  const updatePlanning = (next) => { setPlanning(next); persist('planning', next); };
  const updateMapping = (key, value) => {
    const next = { ...mappings };
    if (value) next[key] = value; else delete next[key];
    updateMappings(next);
  };

  const openNewDish = () => { setDraft({ id: null, name: '', tagsText: '', ingredients: [] }); setShowForm(true); };
  const openEditDish = (dish) => { setDraft({ ...clone(dish), tagsText: (dish.tags || []).join(', ') }); setShowForm(true); };

  const handleSaveDish = () => {
    const tags = (draft.tagsText || '').split(',').map(t => t.trim()).filter(Boolean);
    const ingredients = draft.ingredients.map(sanitizeIngredient).filter(i => i.name);
    if (!draft.name.trim() || ingredients.length === 0) return;
    const normalized = { id: draft.id || uid(), name: draft.name.trim(), tags, ingredients };
    const next = draft.id ? dishes.map(d => d.id === normalized.id ? normalized : d) : [...dishes, normalized];
    updateDishes(next);
    setShowForm(false);
  };

  const handleDeleteDish = (id) => {
    updateDishes(dishes.filter(d => d.id !== id));
    const entries = planning.entries.map(e => e.dishId === id ? { ...e, dishId: '' } : e);
    updatePlanning({ ...planning, entries });
  };

  const handleImportDishes = (imported) => {
    const next = [...dishes];
    let added = 0, updated = 0;
    imported.forEach(imp => {
      const idx = next.findIndex(d => d.name.toLowerCase() === imp.name.toLowerCase());
      if (idx >= 0) { next[idx] = { ...next[idx], tags: imp.tags, ingredients: imp.ingredients }; updated++; }
      else { next.push({ id: uid(), name: imp.name, tags: imp.tags, ingredients: imp.ingredients }); added++; }
    });
    updateDishes(next);
    setShowImport(false);
    window.setTimeout(() => {
      window.alert(`${added} plat(s) ajouté(s)` + (updated ? `, ${updated} mis à jour.` : '.'));
    }, 50);
  };

  const handleRestoreDefaults = () => {
    if (!window.confirm("Remettre le catalogue de plats d'origine ? Tes plats ajoutés seront perdus.")) return;
    updateDishes(clone(DEFAULT_DISHES));
    const entries = planning.entries.map(e => {
      const dish = DEFAULT_DISHES.find(x => x.id === e.dishId);
      return dish ? { dishId: dish.id, name: dish.name, ingredients: clone(dish.ingredients) } : e;
    });
    updatePlanning({ ...planning, entries });
    setShowSettings(false);
  };

  const handleSendMobile = (storeOf) => {
    const data = buildPhysicalShare(shoppingList, storeOf, planning);
    if (!data.stores.length) return;
    setSendData(data);
  };

  const activeEntries = useMemo(
    () => (planning.entries || []).filter(e => e.ingredients && e.ingredients.length),
    [planning.entries]
  );
  const shoppingList = useMemo(
    () => aggregateIngredients(activeEntries, planning.servings),
    [activeEntries, planning.servings]
  );

  // Si on a ouvert un lien/QR partagé : afficher la liste reçue, point.
  if (liveListId) {
    return <LiveListView listId={liveListId} />;
  }
  if (sharedData && sharedData.stores) {
    return <ReceivedListView data={sharedData} />;
  }

  return (
    <div className="p-4 md:p-8">
      <div className="max-w-3xl mx-auto">
        <header className="mb-4 flex items-start justify-between gap-2">
          <div>
            <div className="text-xs uppercase tracking-widest text-ink-soft">Carnet de courses</div>
            <h1 className="font-display text-2xl md:text-3xl">Plats de la semaine</h1>
          </div>
          <button className="btn-ghost" onClick={() => setShowSettings(true)} title="Réglages"><Ic n="settings" s={16} /></button>
        </header>

        <nav className="tab-bar mt-4">
          {TABS.map(t => (
            <button key={t.id} className={`tab-btn ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
              <Ic n={t.icon} s={15} /> {t.label}
            </button>
          ))}
        </nav>

        <div className="panel">
          {loading ? (
            <p className="text-ink-soft text-sm">Chargement…</p>
          ) : (
            <React.Fragment>
              {activeTab === 'plats' && <PlatsView dishes={dishes} onNew={openNewDish} onEdit={openEditDish} onDelete={handleDeleteDish} onImport={() => setShowImport(true)} />}
              {activeTab === 'planning' && <PlanningView dishes={dishes} planning={planning} updatePlanning={updatePlanning} />}
              {activeTab === 'liste' && (
                <ShoppingListView
                  shoppingList={shoppingList}
                  planning={planning}
                  mappings={mappings}
                  checked={checked}
                  setChecked={setChecked}
                  storeAssign={storeAssign}
                  setStoreAssign={updateStoreAssign}
                  goToPlanning={() => setActiveTab('planning')}
                  onSendMobile={handleSendMobile}
                />
              )}
              {activeTab === 'produits' && <ProductsView dishes={dishes} planning={planning} mappings={mappings} updateMapping={updateMapping} />}
            </React.Fragment>
          )}
        </div>
      </div>

      {showForm && draft && (
        <DishFormModal draft={draft} setDraft={setDraft} onSave={handleSaveDish} onClose={() => setShowForm(false)} />
      )}
      {showImport && (
        <ImportDishesModal onClose={() => setShowImport(false)} onImport={handleImportDishes} />
      )}
      {sendData && (
        <SendMobileModal shareData={sendData} onClose={() => setSendData(null)} />
      )}
      {showSettings && <SettingsModal onClose={() => setShowSettings(false)} onRestore={handleRestoreDefaults} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
// Dernier filet de sécurité : si React/Babel ne remplace pas le contenu, on évite la page blanche.
window.addEventListener('load', function(){
  setTimeout(function(){
    var root = document.getElementById('root');
    if (!root) return;
    var txt = (root.textContent || '').trim();
    if (txt.indexOf('Chargement du carnet de courses') !== -1 && window.__cdcShowBootError) {
      window.__cdcShowBootError('React/Babel n’a pas démarré. Cause probable : CDN bloqué/indisponible, cache navigateur cassé, ou erreur JavaScript avant le rendu.');
    }
  }, 2500);
});
</script>
</body>
</html>
